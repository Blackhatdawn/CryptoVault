<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient definition -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldDarkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield outline (dark background) -->
  <path d="M 256 80 L 360 140 L 360 260 C 360 380 256 420 256 420 C 256 420 152 380 152 260 L 152 140 Z" 
        fill="url(#shieldDarkGradient)" stroke="none"/>
  
  <!-- Shield gold overlay -->
  <path d="M 256 100 L 340 150 L 340 260 C 340 370 256 400 256 400 C 256 400 172 370 172 260 L 172 150 Z" 
        fill="url(#shieldGradient)" stroke="none"/>
  
  <!-- Chart bars inside shield (dark bars for contrast) -->
  <g>
    <!-- Bar 1 -->
    <rect x="190" y="280" width="30" height="60" fill="#2C3E50" rx="3"/>
    <!-- Bar 2 -->
    <rect x="240" y="240" width="30" height="100" fill="#2C3E50" rx="3"/>
    <!-- Bar 3 -->
    <rect x="290" y="200" width="30" height="140" fill="#2C3E50" rx="3"/>
  </g>
</svg>
